server {
    listen 80;
    server_name shiorinote.local;
    root /var/www/shiorinote/public;
    index index.php index.html;

    client_max_body_size 4m;
    charset utf-8;

    location / {
        # public/ が唯一のWebルートです。
        # https://yourdomain.com/ は public/index.php に入ります。
        # 初回アクセス時は /install/ でセットアップします。管理パスはインストール時に生成・指定します。
        # アプリ内の rewrite_enabled=True/False の両方に対応します。
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 60s;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~ /(?:config|database|deploy|page)/ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}
